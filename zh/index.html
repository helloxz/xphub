<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="XPHub — 打造你的数字工具箱。文件分享、书签管理、图床、短链接、OCR 识别等实用软件产品。" />
  <title>XPHub — 打造你的数字工具箱</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script type="module" src="/src/js/main.js"></script>
  <script type="module" src="/src/css/main.css"></script>
</head>
<body class="font-sans antialiased text-gray-900 bg-white" x-data="app">

  <!-- Navbar -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100" x-data>
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo -->
        <a href="#" class="flex items-center gap-2 text-xl font-extrabold text-gray-900 tracking-tight" @click.prevent="scrollTo('hero')">
          <span class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-sm font-bold">X</span>
          XPHub
        </a>

        <!-- Right side: nav + lang switch + mobile btn -->
        <div class="flex items-center gap-3">
          <!-- Desktop nav -->
          <div class="hidden md:flex items-center gap-6">
            <button @click="scrollTo('selfHosted')" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition-colors" x-text="t.nav.selfHosted"></button>
            <button @click="scrollTo('saas')" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition-colors" x-text="t.nav.saas"></button>
            <button @click="scrollTo('devTools')" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition-colors" x-text="t.nav.devTools"></button>
            <button @click="scrollTo('about')" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition-colors" x-text="t.nav.contact"></button>
          </div>
          <a :href="t.langSwitch.url" class="text-sm font-medium px-3 py-1.5 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-700 transition-colors" x-text="t.langSwitch.label"></a>
          <!-- Mobile menu button -->
          <button @click="toggleMobileMenu()" class="md:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">
            <i class="fa-solid fa-bars text-lg" x-show="!mobileMenuOpen"></i>
            <i class="fa-solid fa-xmark text-lg" x-show="mobileMenuOpen"></i>
          </button>
        </div>
      </div>

      <!-- Mobile menu -->
      <div x-show="mobileMenuOpen" x-transition.opacity.scale.origin.top class="md:hidden pb-4 border-t border-gray-100 mt-0" style="display:none">
        <div class="flex flex-col gap-2 pt-3">
          <button @click="scrollTo('selfHosted')" class="text-sm font-medium text-gray-600 hover:text-indigo-600 py-2 transition-colors text-left" x-text="t.nav.selfHosted"></button>
          <button @click="scrollTo('saas')" class="text-sm font-medium text-gray-600 hover:text-indigo-600 py-2 transition-colors text-left" x-text="t.nav.saas"></button>
          <button @click="scrollTo('devTools')" class="text-sm font-medium text-gray-600 hover:text-indigo-600 py-2 transition-colors text-left" x-text="t.nav.devTools"></button>
          <button @click="scrollTo('about')" class="text-sm font-medium text-gray-600 hover:text-indigo-600 py-2 transition-colors text-left" x-text="t.nav.contact"></button>
        </div>
      </div>
    </nav>
  </header>

  <!-- Hero -->
  <section id="hero" class="relative pt-32 pb-20 sm:pt-40 sm:pb-28 overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-indigo-50 via-white to-purple-50"></div>
    <div class="absolute top-20 right-0 w-72 h-72 bg-indigo-300/20 rounded-full blur-3xl"></div>
    <div class="absolute bottom-10 left-0 w-96 h-96 bg-purple-300/20 rounded-full blur-3xl"></div>
    <div class="relative max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold text-gray-900 tracking-tight leading-tight" x-text="t.hero.title"></h1>
      <p class="mt-6 text-lg sm:text-xl text-gray-500 max-w-2xl mx-auto leading-relaxed" x-text="t.hero.subtitle"></p>
      <div class="mt-10">
        <button @click="scrollTo('products')" class="inline-flex items-center gap-2 px-8 py-3.5 bg-indigo-600 text-white font-semibold rounded-full shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:shadow-xl hover:shadow-indigo-300 transition-all duration-300 text-lg">
          <span x-text="t.hero.cta"></span>
          <i class="fa-solid fa-arrow-down"></i>
        </button>
      </div>
    </div>
  </section>

  <!-- Products -->
  <section id="products" class="py-20 sm:py-28 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

      <!-- Section: Self-Hosted -->
      <div id="selfHosted" class="mb-24">
        <div class="text-center mb-14">
          <h2 class="text-3xl sm:text-4xl font-extrabold text-gray-900" x-text="t.sections.selfHosted.title"></h2>
          <p class="mt-3 text-gray-500 text-lg" x-text="t.sections.selfHosted.desc"></p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <template x-for="p in t.products.selfHosted" :key="p.name">
            <a :href="p.url" target="_blank" rel="noopener" class="group flex flex-col h-full p-6 bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:border-indigo-100 transition-all duration-300">
              <div class="flex justify-center mb-3">
                <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600 text-xl group-hover:scale-110 transition-all duration-300">
                  <i :class="p.icon"></i>
                </div>
              </div>
              <h3 class="text-lg font-bold text-gray-900 text-center mb-2" x-text="p.name"></h3>
              <p class="text-gray-500 text-sm leading-relaxed mb-4 text-left" x-text="p.desc"></p>
              <div class="mt-auto flex justify-center">
                <span class="inline-flex items-center gap-1.5 text-sm font-semibold text-indigo-600 group-hover:gap-2.5 transition-all">
                  <span x-text="p.urlLabel"></span>
                  <i class="fa-solid fa-arrow-right text-xs"></i>
                </span>
              </div>
            </a>
          </template>
        </div>
      </div>

      <!-- Section: SaaS -->
      <div id="saas" class="mb-24">
        <div class="text-center mb-14">
          <h2 class="text-3xl sm:text-4xl font-extrabold text-gray-900" x-text="t.sections.saas.title"></h2>
          <p class="mt-3 text-gray-500 text-lg" x-text="t.sections.saas.desc"></p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <template x-for="p in t.products.saas" :key="p.name">
            <a :href="p.url" target="_blank" rel="noopener" class="group flex flex-col h-full p-6 bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:border-emerald-100 transition-all duration-300">
              <div class="flex justify-center mb-3">
                <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center text-emerald-600 text-xl group-hover:scale-110 transition-all duration-300">
                  <i :class="p.icon"></i>
                </div>
              </div>
              <h3 class="text-lg font-bold text-gray-900 text-center mb-2" x-text="p.name"></h3>
              <p class="text-gray-500 text-sm leading-relaxed mb-4 text-left" x-text="p.desc"></p>
              <div class="mt-auto flex justify-center">
                <span class="inline-flex items-center gap-1.5 text-sm font-semibold text-emerald-600 group-hover:gap-2.5 transition-all">
                  <span x-text="p.urlLabel"></span>
                  <i class="fa-solid fa-arrow-right text-xs"></i>
                </span>
              </div>
            </a>
          </template>
        </div>
      </div>

      <!-- Section: Dev Tools -->
      <div id="devTools" class="mb-24">
        <div class="text-center mb-14">
          <h2 class="text-3xl sm:text-4xl font-extrabold text-gray-900" x-text="t.sections.devTools.title"></h2>
          <p class="mt-3 text-gray-500 text-lg" x-text="t.sections.devTools.desc"></p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
          <template x-for="p in t.products.devTools" :key="p.name">
            <a :href="p.url" target="_blank" rel="noopener" class="group flex flex-col h-full p-6 bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:border-amber-100 transition-all duration-300">
              <div class="flex justify-center mb-3">
                <div class="w-12 h-12 bg-amber-50 rounded-xl flex items-center justify-center text-amber-600 text-xl group-hover:scale-110 transition-all duration-300">
                  <i :class="p.icon"></i>
                </div>
              </div>
              <h3 class="text-lg font-bold text-gray-900 text-center mb-2" x-text="p.name"></h3>
              <p class="text-gray-500 text-sm leading-relaxed mb-4 text-left" x-text="p.desc"></p>
              <div class="mt-auto flex justify-center">
                <span class="inline-flex items-center gap-1.5 text-sm font-semibold text-amber-600 group-hover:gap-2.5 transition-all">
                  <span x-text="p.urlLabel"></span>
                  <i class="fa-solid fa-arrow-right text-xs"></i>
                </span>
              </div>
            </a>
          </template>
        </div>
      </div>

    </div>
  </section>

  <!-- About -->
  <section id="about" class="py-16 sm:py-20 bg-gray-50">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <h2 class="text-3xl sm:text-4xl font-extrabold text-gray-900" x-text="t.about.title"></h2>
      <p class="mt-6 text-gray-500 text-lg leading-relaxed" x-text="t.about.text"></p>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact" class="py-20 sm:py-28 bg-gray-50">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <h2 class="text-3xl sm:text-4xl font-extrabold text-gray-900" x-text="t.contact.title"></h2>
      <p class="mt-3 text-gray-500 text-lg" x-text="t.contact.desc"></p>
      <div class="mt-10 flex flex-col sm:flex-row items-center justify-center gap-6">
        <div class="flex items-center gap-3 px-6 py-4 bg-white rounded-2xl shadow-sm border border-gray-100">
          <i class="fa-brands fa-weixin text-green-500 text-2xl"></i>
          <div class="text-left">
            <div class="text-sm font-semibold text-gray-900" x-text="t.contact.wechat"></div>
            <div class="text-xs text-gray-400" x-text="t.contact.wechatNote"></div>
          </div>
        </div>
        <a href="https://wpa.qq.com/msgrd?v=3&uin=337003006&site=qq&menu=yes" target="_blank" rel="noopener" class="flex items-center gap-3 px-6 py-4 bg-white rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
          <i class="fa-brands fa-qq text-blue-500 text-2xl"></i>
          <div class="text-left">
            <div class="text-sm font-semibold text-gray-900" x-text="t.contact.qq"></div>
          </div>
        </a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col md:flex-row items-center justify-between gap-6">
        <div class="flex items-center gap-2">
          <span class="text-sm text-gray-400" x-text="t.footer.linksLabel"></span>
          <a href="https://blog.xiaoz.org/" target="_blank" rel="noopener" class="text-sm text-gray-400 hover:text-white transition-colors" x-text="t.footer.blog"></a>
          <a href="https://shop.xiuping.net/" target="_blank" rel="noopener" class="text-sm text-gray-400 hover:text-white transition-colors" x-text="t.footer.shop"></a>
        </div>
        <p class="text-sm">
          © <span x-text="new Date().getFullYear()"></span> XPHub. All rights reserved.
        </p>
      </div>
    </div>
  </footer>

</body>
</html>
